workflows:

  # ─────────────────────────────────────────────
  # WORKFLOW 1 : Android Debug APK  (no signing needed)
  #              Best for quick testing / sharing
  # ─────────────────────────────────────────────
  android-debug-apk:
    name: Android Debug APK
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: stable
      java: 17
      # No signing variables needed for debug
      vars:
        PACKAGE_NAME: "com.janki.agrotourism"

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches

    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Analyze code
        script: |
          flutter analyze --no-fatal-infos || true

      - name: Build Debug APK
        script: |
          flutter build apk --debug \
            --build-name=1.0.0 \
            --build-number=$(($(date +%s)))

    artifacts:
      - build/**/outputs/**/*.apk
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - your-email@example.com    # ← Change to your email
        notify:
          success: true
          failure: true


  # ─────────────────────────────────────────────
  # WORKFLOW 2 : Android Release APK  (signed)
  #              Required for Google Play / sharing release build
  # ─────────────────────────────────────────────
  android-release-apk:
    name: Android Release APK (Signed)
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: stable
      java: 17
      android_signing:
        - janki_keystore           # ← Name you give when uploading keystore in Codemagic UI
      vars:
        PACKAGE_NAME: "com.janki.agrotourism"

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches

    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Set up key.properties for signing
        script: |
          # Codemagic injects CM_KEYSTORE, CM_KEY_ALIAS, CM_KEY_PASSWORD, CM_KEYSTORE_PASSWORD
          cat >> "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF

      - name: Build Release APK
        script: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=$(($(date +%s)))

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - your-email@example.com    # ← Change to your email
        notify:
          success: true
          failure: true


  # ─────────────────────────────────────────────
  # WORKFLOW 3 : Android Release AAB
  #              For Google Play Store upload
  # ─────────────────────────────────────────────
  android-release-aab:
    name: Android Release AAB (Play Store)
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: stable
      java: 17
      android_signing:
        - janki_keystore           # ← Name you give when uploading keystore in Codemagic UI
      vars:
        PACKAGE_NAME: "com.janki.agrotourism"

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches

    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Set up key.properties for signing
        script: |
          cat >> "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF

      - name: Build Release AAB
        script: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=$(($(date +%s)))

    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - your-email@example.com    # ← Change to your email
        notify:
          success: true
          failure: true


  # ─────────────────────────────────────────────
  # WORKFLOW 4 : iOS IPA (requires Apple Dev account)
  # ─────────────────────────────────────────────
  ios-release:
    name: iOS Release IPA
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store      # or: ad_hoc, development
        bundle_identifier: com.janki.agrotourism
      vars:
        BUNDLE_ID: "com.janki.agrotourism"
        XCODE_PROJECT: "ios/Runner.xcodeproj"
        XCODE_SCHEME: "Runner"

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Flutter analyze
        script: |
          flutter analyze --no-fatal-infos || true

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$(($(date +%s))) \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY       # Add in Codemagic → Team settings → Integrations
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false
      email:
        recipients:
          - your-email@example.com    # ← Change to your email
        notify:
          success: true
          failure: true
