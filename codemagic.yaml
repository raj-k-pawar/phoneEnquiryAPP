workflows:

  # ══════════════════════════════════════════════
  # WORKFLOW 1 — Android Debug APK
  # No signing needed — quickest way to get APK
  # ══════════════════════════════════════════════
  android-debug-apk:
    name: "Android Debug APK"
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: 3.24.5
      java: 17

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches

    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: |
          cd "$CM_BUILD_DIR"
          flutter pub get

      - name: Build Debug APK
        script: |
          cd "$CM_BUILD_DIR"
          flutter build apk \
            --debug \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - your-email@gmail.com      # ← CHANGE THIS to your email
        notify:
          success: true
          failure: true


  # ══════════════════════════════════════════════
  # WORKFLOW 2 — Android Release APK (Signed)
  # Upload keystore in Codemagic → Code Signing
  # ══════════════════════════════════════════════
  android-release-apk:
    name: "Android Release APK (Signed)"
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: 3.24.5
      java: 17
      android_signing:
        - janki_keystore              # Must match name in Codemagic → Code Signing

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches

    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: |
          cd "$CM_BUILD_DIR"
          flutter pub get

      - name: Set up key.properties
        script: |
          cat > "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF

      - name: Build Release APK
        script: |
          cd "$CM_BUILD_DIR"
          flutter build apk \
            --release \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - your-email@gmail.com      # ← CHANGE THIS
        notify:
          success: true
          failure: true


  # ══════════════════════════════════════════════
  # WORKFLOW 3 — Android AAB (Google Play Store)
  # ══════════════════════════════════════════════
  android-release-aab:
    name: "Android AAB (Play Store)"
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: 3.24.5
      java: 17
      android_signing:
        - janki_keystore

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches

    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: |
          cd "$CM_BUILD_DIR"
          flutter pub get

      - name: Set up key.properties
        script: |
          cat > "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF

      - name: Build AAB
        script: |
          cd "$CM_BUILD_DIR"
          flutter build appbundle \
            --release \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab

    publishing:
      email:
        recipients:
          - your-email@gmail.com      # ← CHANGE THIS
        notify:
          success: true
          failure: true


  # ══════════════════════════════════════════════
  # WORKFLOW 4 — iOS IPA
  # Requires Apple Developer account
  # ══════════════════════════════════════════════
  ios-release:
    name: "iOS Release IPA"
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      flutter: 3.24.5
      xcode: 15.4
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.janki.agrotourism

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Get Flutter packages
        script: |
          cd "$CM_BUILD_DIR"
          flutter pub get

      - name: Pod install
        script: |
          cd "$CM_BUILD_DIR/ios"
          pod install --repo-update

      - name: Build IPA
        script: |
          cd "$CM_BUILD_DIR"
          flutter build ipa \
            --release \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - your-email@gmail.com      # ← CHANGE THIS
        notify:
          success: true
          failure: true
