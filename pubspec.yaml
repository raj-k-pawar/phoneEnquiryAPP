name: janki_agro_tourism
description: Janki Agro Tourism - Enquiry Management App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UI
  table_calendar: ^3.0.9
  google_fonts: ^6.1.0
  intl: ^0.18.1

  # Utils
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
